name: Build Docker Image

on:
  push:
    branches: [ mainline ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ mainline ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: determine_tag
        run: |
          # Try to get tag from git
          GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")

          if [ -n "$GIT_TAG" ]; then
            # Remove 'v' prefix if present
            IMAGE_TAG=${GIT_TAG#v}
            echo "Using git tag: $IMAGE_TAG"
          else
            # Parse version from pyproject.toml
            if [ -f "pyproject.toml" ]; then
              VERSION=$(grep -m 1 'version = ' pyproject.toml | sed 's/version = //g' | sed 's/"//g' | sed "s/'//g" | tr -d ' ')
              IMAGE_TAG=$VERSION
              echo "Using version from pyproject.toml: $IMAGE_TAG"
            else
              # Fallback to latest if no tag or pyproject.toml
              IMAGE_TAG="dev"
              echo "No tag or pyproject.toml found, using: $IMAGE_TAG"
            fi
          fi

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            kuhl-haus/kuhl-haus-metrics:${{ env.IMAGE_TAG }}
            kuhl-haus/kuhl-haus-metrics:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
